name: Deploy Backend to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/learnlens hf-space
          rsync -av --delete --exclude '.git' backend/ hf-space/
          cd hf-space
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy from GitHub Actions ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Set Space secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${HF_TOKEN}')
          api.add_space_secret(repo_id='${HF_USERNAME}/learnlens', key='SAMBANOVA_API_KEY', value='${SAMBANOVA_API_KEY}')
          api.add_space_secret(repo_id='${HF_USERNAME}/learnlens', key='HF_TOKEN', value='${HF_TOKEN}')
          "